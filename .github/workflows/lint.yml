name: Lint

on: pull_request

permissions:
  contents: read

concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read

    outputs:
      eslint: ${{ steps.filter.outputs.eslint }}
      php: ${{ steps.filter.outputs.php }}
      info-xml: ${{ steps.filter.outputs.info-xml }}
      php-min: ${{ steps.versions.outputs.php-min }}
      php-max: ${{ steps.versions.outputs.php-max }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        continue-on-error: true
        with:
          filters: |
            eslint:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '**.js'
              - '**.vue'
            php:
              - 'lib/**'
              - 'composer.json'
              - 'composer.lock'
            info-xml:
              - 'appinfo/info.xml'

      - name: Get version matrix
        id: versions
        uses: icewind1991/nextcloud-version-matrix@8a7bac6300b2f0f3100088b297995a229558ddba # v1.3.2

  eslint:
    runs-on: self-hosted

    needs: changes
    if: needs.changes.outputs.eslint != 'false'

    name: NPM lint

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read package.json node and npm engines version
        uses: skjnldsv/read-package-engines-version-actions@06d6baf7d8f41934ab630e97d9e6c0bc9c9ac5e4 # v3
        id: versions
        with:
          fallbackNode: '^24'
          fallbackNpm: '^11.3'

      - name: Set up node ${{ steps.versions.outputs.nodeVersion }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.versions.outputs.nodeVersion }}

      - name: Set up npm ${{ steps.versions.outputs.npmVersion }}
        run: npm i -g 'npm@${{ steps.versions.outputs.npmVersion }}'

      - name: Install dependencies
        env:
          CYPRESS_INSTALL_BINARY: 0
        run: npm ci

      - name: Lint
        run: npm run lint

  php-lint:
    runs-on: self-hosted

    needs: changes
    if: needs.changes.outputs.php != 'false'

    strategy:
      matrix:
        php-versions: ['${{ needs.changes.outputs.php-min }}', '${{ needs.changes.outputs.php-max }}']

    name: php-lint (${{ matrix.php-versions }})

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install

      - name: Lint
        run: composer run lint

  info-xml:
    runs-on: self-hosted

    needs: changes
    if: needs.changes.outputs.info-xml != 'false'

    name: info.xml lint

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download schema
        run: wget https://raw.githubusercontent.com/nextcloud/appstore/master/nextcloudappstore/api/v1/release/info.xsd

      - name: Lint info.xml
        uses: ChristophWurst/xmllint-action@36f2a302f84f8c83fceea0b9c59e1eb4a616d3c1 # v1.2
        with:
          xml-file: ./appinfo/info.xml
          xml-schema-file: ./info.xsd
